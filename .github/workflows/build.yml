name: Multi-Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Environment (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Build Library (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        gcc -O3 -shared -Ilibpaf libpaf/*.c -o libpaf.dll
      shell: bash

    - name: Build Library (Linux x64 & Android stub)
      if: matrix.os == 'ubuntu-latest'
      run: |
        gcc -O3 -shared -fPIC -Ilibpaf libpaf/*.c -o libpaf.so
        # Android cross-compile test
        aarch64-linux-gnu-gcc -O3 -shared -fPIC -Ilibpaf libpaf/*.c -o libpaf_android_arm64.so

    - name: Build Library (macOS / iOS stub)
      if: matrix.os == 'macos-latest'
      run: |
        gcc -O3 -shared -Ilibpaf libpaf/*.c -o libpaf.dylib

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: libpaf-${{ matrix.os }}
        path: |
          libpaf.dll
          libpaf.so
          libpaf_android_arm64.so
          libpaf.dylib
