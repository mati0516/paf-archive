name: Simple Windows Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Compile
      run: |
        gcc -O3 -shared -Ilibpaf libpaf/*.c -o libpaf.dll
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: libpaf-windows
        path: libpaf.dll
