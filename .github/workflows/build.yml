name: Multi-Platform Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Add MSVC to PATH
      uses: ilammy/msvc-dev-cmd@v1
    - name: Compile Windows libpaf (CPU-only)
      run: |
        cl /O2 /LD /Fe:libpaf.dll /DLIBPAF_EXPORTS /DPAF_CI_BUILD /Ilibpaf/include libpaf/src/*.c
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libpaf-windows
        path: libpaf.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Compile Linux libpaf
      run: |
        gcc -O3 -shared -fPIC -Ilibpaf/include libpaf/src/*.c -o libpaf.so
    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libpaf-linux
        path: libpaf.so

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Android NDK
      id: setup-ndk
      uses: nwtgck/setup-ndk@v1
      with:
        ndk-version: r27c
    - name: Compile Android libpaf (ARM64)
      run: |
        ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang \
        -O3 -shared -fPIC -Ilibpaf/include libpaf/src/*.c -o libpaf-android-arm64.so
    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libpaf-android
        path: libpaf-android-arm64.so

  release:
    needs: [build-windows, build-linux, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare Release Assets
      run: |
        mkdir dist
        cp artifacts/libpaf-windows/libpaf.dll dist/libpaf-windows-x64.dll
        cp artifacts/libpaf-linux/libpaf.so dist/libpaf-linux-x64.so
        cp artifacts/libpaf-android/libpaf-android-arm64.so dist/libpaf-android-arm64.so

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
