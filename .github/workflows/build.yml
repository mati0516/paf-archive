name: Multi-Platform Build (Incl. Mobile)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Build Environment
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y build-essential g++
    - name: Build
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          # Compile C files
          for f in libpaf/*.c; do gcc -O3 -fPIC -Ilibpaf -c $f -o ${f%.c}.o; done
          # Compile C++ files
          for f in libpaf/*.cpp; do g++ -O3 -fPIC -Ilibpaf -c $f -o ${f%.cpp}.o; done
          # Link
          g++ -shared libpaf/*.o -o libpaf.dll -ldxgi -lsetupapi
        elif [ "$RUNNER_OS" == "Linux" ]; then
          for f in libpaf/*.c; do gcc -O3 -fPIC -Ilibpaf -c $f -o ${f%.c}.o; done
          for f in libpaf/*.cpp; do g++ -O3 -fPIC -Ilibpaf -c $f -o ${f%.cpp}.o; done
          g++ -shared -fPIC libpaf/*.o -o libpaf.so
        else
          for f in libpaf/*.c; do gcc -O3 -fPIC -Ilibpaf -c $f -o ${f%.c}.o; done
          for f in libpaf/*.cpp; do g++ -O3 -fPIC -Ilibpaf -c $f -o ${f%.cpp}.o; done
          g++ -shared libpaf/*.o -o libpaf.dylib
        fi
      shell: bash
    - name: Test Build (Security)
      run: |
        echo "Verifying build artifacts..."
        ls -l libpaf.* || ls -l libpaf/libpaf.* || true
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: libpaf-${{ matrix.os }}
        path: libpaf.*

  build-android:
    name: Build Android (NDK)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up NDK
      uses: nndat/setup-ndk@v1
      with:
        ndk-version: r25c
    - name: Build for Android (arm64-v8a)
      run: |
        # Use clang++ for linking C and C++ objects
        $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++ \
        -O3 -shared -fPIC -Ilibpaf libpaf/*.c libpaf/*.cpp -o libpaf_android_arm64.so
    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libpaf-android
        path: libpaf_android_*.so

  build-ios:
    name: Build iOS (Xcode)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build for iOS (Device)
      run: |
        xcrun --sdk iphoneos clang++ -O3 -dynamiclib -arch arm64 -Ilibpaf libpaf/*.c libpaf/*.cpp -o libpaf_ios.dylib
    - name: Build for iOS (Simulator)
      run: |
        xcrun --sdk iphonesimulator clang++ -O3 -dynamiclib -arch x86_64 -Ilibpaf libpaf/*.c libpaf/*.cpp -o libpaf_ios_sim.dylib
    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libpaf-ios
        path: libpaf_ios*.dylib
